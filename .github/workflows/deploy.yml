name: Deploy to DEI Cloud Server

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  SSH_HOST: cloud.dei.isep.ipp.pt
  SSH_PORT: 922
  SSH_USER: root
  BACKEND_PATH: /opt/dei-backend
  FRONTEND_PATH: /var/www/html

jobs:
  deploy-backend:
    name: Deploy Backend to DEI Cloud
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup VPN connection
        uses: guillaumevincent/setup-openvpn@v2
        with:
          config_file: .github/workflows/openvpn-config.ovpn
          username: ${{ secrets.VPN_USERNAME }}
          password: ${{ secrets.VPN_PASSWORD }}
      
      - name: Wait for VPN to establish
        run: |
          echo "Waiting for VPN connection to stabilize..."
          for i in {1..30}; do
            if ping -c 1 -W 2 192.168.62.4 > /dev/null 2>&1; then
              echo "✅ VPN connected successfully!"
              exit 0
            fi
            echo "Attempt $i/30: Waiting for VPN route..."
            sleep 2
          done
          echo "❌ Failed to establish VPN connection"
          exit 1
      
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ env.SSH_PORT }} -H ${{ env.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
      
      - name: Test SSH connection
        run: |
          ssh -p ${{ env.SSH_PORT }} -o ConnectTimeout=10 -o StrictHostKeyChecking=no ${{ env.SSH_USER }}@${{ env.SSH_HOST }} "echo '✅ SSH connection successful'"
      
      - name: Create backend directory on server
        run: |
          ssh -p ${{ env.SSH_PORT }} ${{ env.SSH_USER }}@${{ env.SSH_HOST }} "mkdir -p ${{ env.BACKEND_PATH }}"
      
      - name: Create .env file locally
        run: |
          cat > backend/.env << EOF
          PORT=3000
          NODE_ENV=production
          BASE_FOLDER=/vs_cloud
          LDAP_URL=ldap://192.168.62.4
          LDAP_BASE_DN=ou=users,dc=dei,dc=isep,dc=ipp,dc=pt
          LDAP_USER_ATTR=uid
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN=8h
          CORS_ORIGIN=https://cloud.dei.isep.ipp.pt,http://localhost:4200
          LOG_LEVEL=info
          EOF
          
          echo "✅ .env file created"
          cat backend/.env | head -5  # Show first 5 lines for verification
      
      - name: Sync backend files to server (excluding sensitive files)
        run: |
          rsync -avz -e "ssh -p ${{ env.SSH_PORT }}" \
            --exclude 'node_modules' \
            --exclude '.env.local' \
            --exclude 'logs' \
            --exclude '*.log' \
            --exclude 'tests' \
            backend/ ${{ env.SSH_USER }}@${{ env.SSH_HOST }}:${{ env.BACKEND_PATH }}/
      
      - name: Install dependencies on server
        run: |
          ssh -p ${{ env.SSH_PORT }} ${{ env.SSH_USER }}@${{ env.SSH_HOST }} \
            "cd ${{ env.BACKEND_PATH }} && npm install --production"
      
      - name: Stop existing PM2 process
        run: |
          ssh -p ${{ env.SSH_PORT }} ${{ env.SSH_USER }}@${{ env.SSH_HOST }} \
            "pm2 stop dei-backend 2>/dev/null || echo 'No existing process'"
      
      - name: Start application with PM2
        run: |
          ssh -p ${{ env.SSH_PORT }} ${{ env.SSH_USER }}@${{ env.SSH_HOST }} \
            "cd ${{ env.BACKEND_PATH }} && pm2 start server.js --name dei-backend && pm2 save"
      
      - name: Verify backend is running
        run: |
          sleep 5
          ssh -p ${{ env.SSH_PORT }} ${{ env.SSH_USER }}@${{ env.SSH_HOST }} \
            "curl -s http://localhost:3000/health | grep -q OK && echo '✅ Backend is healthy' || exit 1"

  deploy-frontend:
    name: Deploy Frontend to DEI Cloud
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: success()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      
      - name: Build Angular app
        run: |
          cd frontend
          npm run build -- --configuration production
      
      - name: Setup VPN connection
        uses: guillaumevincent/setup-openvpn@v2
        with:
          config_file: .github/workflows/openvpn-config.ovpn
          username: ${{ secrets.VPN_USERNAME }}
          password: ${{ secrets.VPN_PASSWORD }}
      
      - name: Wait for VPN to establish
        run: |
          for i in {1..30}; do
            if ping -c 1 -W 2 192.168.62.4 > /dev/null 2>&1; then
              echo "✅ VPN connected"
              exit 0
            fi
            sleep 2
          done
          exit 1
      
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
      
      - name: Deploy frontend to Apache directory
        run: |
          ssh -p ${{ env.SSH_PORT }} ${{ env.SSH_USER }}@${{ env.SSH_HOST }} \
            "mkdir -p ${{ env.FRONTEND_PATH }}"
          
          rsync -avz -e "ssh -p ${{ env.SSH_PORT }}" \
            --delete \
            frontend/dist/frontend/browser/ \
            ${{ env.SSH_USER }}@${{ env.SSH_HOST }}:${{ env.FRONTEND_PATH }}/
          
          echo "✅ Frontend deployed successfully!"