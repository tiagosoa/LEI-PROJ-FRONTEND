name: Deploy to DEI Cloud

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: 

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: |
          Backend/package-lock.json
          Frontend/package-lock.json
    
    - name: Install backend dependencies
      run: |
        cd Backend
        npm ci
    
    - name: Install frontend dependencies
      run: |
        cd Frontend
        npm ci
    
    - name: Setup SSH agent
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}
    
    - name: Add server to known hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
        ssh-keyscan -p 22 ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
    
    - name: Connect to DEI VPN
      run: |
        chmod +x Scripts/vpn-connect.sh
        ./Scripts/vpn-connect.sh \
          "${{ secrets.VPN_SERVER }}" \
          "${{ secrets.VPN_HUB }}" \
          "${{ secrets.VPN_USER }}" \
          "${{ secrets.VPN_PASSWORD }}"
    
    - name: Test SSH connection
      run: |
        ssh -p ${{ secrets.SERVER_PORT }} \
          -o ConnectTimeout=10 \
          ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
          "echo 'SSH connection successful!'"
    
    - name: Deploy Backend
      run: |
        chmod +x Scripts/deploy-backend.sh
        ./Scripts/deploy-backend.sh \
          "${{ secrets.SERVER_HOST }}" \
          "${{ secrets.SERVER_PORT }}" \
          "${{ secrets.SERVER_USER }}" \
          "/opt/dei-backend"
    
    - name: Deploy Frontend
      run: |
        chmod +x Scripts/deploy-frontend.sh
        ./Scripts/deploy-frontend.sh \
          "${{ secrets.SERVER_HOST }}" \
          "${{ secrets.SERVER_PORT }}" \
          "${{ secrets.SERVER_USER }}" \
          "/var/www/dei-cloud-frontend"
    
    - name: Reload Apache
      run: |
        ssh -p ${{ secrets.SERVER_PORT }} ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
          "systemctl reload apache2 2>/dev/null || systemctl reload httpd 2>/dev/null || true"
    
    - name: Verify deployment
      run: |
        echo "Waiting for services to start..."
        sleep 10
        
        # Testar backend
        echo "Checking backend..."
        curl -s -o /dev/null -w "Backend health: %{http_code}\n" \
          https://cloud.dei.isep.ipp.pt/health || \
          echo "Backend health check pending..."
        
        # Testar frontend
        echo "Checking frontend..."
        curl -s -o /dev/null -w "Frontend: %{http_code}\n" \
          https://cloud.dei.isep.ipp.pt/ || \
          echo "Frontend check pending..."
    
    - name: Disconnect VPN
      if: always()
      run: |
        cd /tmp/vpnclient 2>/dev/null && ./vpnclient stop 2>/dev/null || true